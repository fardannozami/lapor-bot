services:
  app:
    build: .
    container_name: lapor-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite DB and WhatsApp session data
      - ./data:/app/data
      # Mount .env file for configuration
      - ./.env:/app/.env
    environment:
      - PORT=8080
      - SQLITE_PATH=/app/data/whatsapp.db
      # TZ for correct time in reports (e.g., "Asia/Jakarta")
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
